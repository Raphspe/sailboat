  </g>
  <!-- Title -->
  <text x="600" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#e0f2fe" letter-spacing="8">SAILBOAT</text>
  <!-- Subtitle -->
  <text x="600" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#7dd3fc" opacity="0.7">Lexique interactif de la voile</text>
  <!-- Stats -->
  <text x="600" y="540" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#94a3b8" opacity="0.5">172 termes  ·  6 diagrammes  ·  schemas interactifs</text>
</svg>
